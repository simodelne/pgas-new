  curator_request:
    include: [program.slug, repo.curator_request_lodged, repo.wiring_manifest_json, repo.required_facilities_missing, curator_requests.requests]
    exclude: []

prompts:
  intake_intelligence: |
    Output protocol (MUST follow):
    - When you need to commit state (record a Q-answer, choose a path,
      approve, etc.), emit a NATIVE OpenAI tool_call. The available tools
      are listed in the system's tools array -- their schemas define the
      exact argument names.
    - DO NOT emit a JSON object in the message content describing the
      action. DO NOT emit an object with a `MutationAction` shape. DO NOT
      use the spec's `from` + `_arg: <name>` syntax as a literal argument
      key -- that mapping marker is internal spec syntax describing how the
      engine maps your tool argument named `<name>` to a state path.
    - Every round must emit exactly one NATIVE OpenAI tool_call from the
      current mode vocabulary. Do not output free-form question text as
      assistant message content; the engine parses uncalled content as an
      invalid empty-name action.
    - To ask Q1-Q6, call `ask_design_question` with `question_number` (1..6)
      and `question_text`. The engine pauses the round; the user's typed
      reply arrives next round via inputs.user_text.
    - One tool_call per round.

    This mode collects the program-design intake. You MUST drive the design
    interview by calling the declared tools as tool calls when you are ready
    to commit governed state -- NOT by emitting raw JSON mutations.

    Per turn:
    - Process `inputs.user_text` and either call `ask_design_question` for
      the next Q1-Q6 design-interview question, OR fire the single terminal
      tool call that commits the governed state you have enough information
      to record.
    Design interview enforcement (Q1-Q6):
    - The engine enforces strict left-to-right ordering via per-question
      preconditions. You CANNOT skip ahead.
    - For each question:
      1. Call `ask_design_question` with `question_number` and
         `question_text`. The engine pauses.
      2. The user's answer arrives via user_text on the next round.
      3. Fire the corresponding `record_qN_<topic>` action with the user's
         answer parsed into that action's named argument.
      4. Move to the next question.
    - After Q6 fires, immediately fire `record_program_intake_finalize`.
    - Do NOT attempt to batch multiple answers into one action. Do NOT attempt
      to fire `record_program_intake_finalize` before all six qN_recorded flags
      are true -- the engine will reject it.
    - When you are ready to commit state: Make exactly ONE terminal tool call
      from the mode's vocabulary. The arguments to each tool are structured
      per the tool's schema; emit them as the tool's argument object, not as a
      `mutations` array. One tool call per round when committing.

    Order of intake:
    1. If `program.target_dir_confirmed` is false: call `record_program_target`
       with `{slug, name, target_dir}` derived from the user's initial message
       OR from the CLI-seeded domain (check `program.slug`, `program.name`,
       `program.target_dir` if they are pre-set).
    2. After target capture: call `choose_design_path` with `{choice: "default"}`
       or `{choice: "design"}` based on what the user asked for.
    3. If `choice = "default"`: call `apply_default_skeleton` immediately.
    4. If `choice = "design"`: ask Q1-Q6 by calling `ask_design_question`,
       recording each answer with its corresponding Q-action, then call
       `record_program_intake_finalize`.
    5. Finally call `confirm_design` to gate transition to repo_targeting.
    6. If the user_confirmation decision is `reject` and the instruction names
       Q1, Q2, Q3, Q4, Q5, or Q6, call the matching
       `reject_design_and_revise_qN` action first. Then re-run that Q-action
       and continue from there through Q6 before asking for confirmation again.

    Do not pre-fill or batch multiple tool calls in one response.
  repo_targeting: |
    Output protocol (MUST follow):
    - Emit exactly one NATIVE OpenAI tool_call from the repo_targeting vocabulary.
    - Do not emit free-form JSON action objects or multiple tool calls.

    Resolve repository write authorization before architecture_design.
    - If `program.target_dir` is set and the target is a standalone/new repo
      with no known `.pgas/wiring.yml`, call `authorize_standalone_target`.
      This action selects `repo.target_kind = standalone_repo` and sets
      `repo.write_authorized = true`.
    - If `program.target_dir` is set and the target is an existing repo with
      `.pgas/wiring.yml`, call `load_wiring_manifest` with
      `{ "repo_root": "<program.target_dir>" }`. After it succeeds, call
      `authorize_existing_repo_target`.
    - If `repo.target_kind` is already `standalone_repo`, call
      `authorize_standalone_target`.
    - If `repo.target_kind` is already `existing_repo`, call
      `load_wiring_manifest` first unless `repo.wiring_manifest.status` is
      already `valid`; then call `authorize_existing_repo_target`.
    - If the target kind or target directory is unclear, ask the user to
      clarify whether this is a standalone repo or an existing-repo attach
      before any write authorization.
  architecture_design: "Run the deterministic program-spec synthesizer."
  scaffold_plan: |
    Output protocol (MUST follow):
    - When you need to commit state (record a Q-answer, choose a path,
      approve, etc.), emit a NATIVE OpenAI tool_call. The available tools
      are listed in the system's tools array -- their schemas define the
      exact argument names.
    - DO NOT emit a JSON object in the message content describing the
      action. DO NOT emit an object with a `MutationAction` shape. DO NOT
      use the spec's `from` + `_arg: <name>` syntax as a literal argument
      key -- that mapping marker is internal spec syntax describing how the
      engine maps your tool argument named `<name>` to a state path.
    - Every round must emit exactly one NATIVE OpenAI tool_call from the
      current mode vocabulary. Do not output free-form prose without a
      tool_call; the engine parses uncalled content as an invalid action.
    - One tool_call per round.

    Create and approve the artifact plan before writes.
    - On system_mode_entry with no artifact_plan.status, call plan_artifacts.
    - On user_confirmation decision='approve' with artifact_plan.status='draft',
      call approve_artifact_plan. Do NOT call plan_artifacts on approval.
    - On user_confirmation decision='reject' with artifact_plan.status='draft',
      call revise_artifact_plan. Do NOT call approve_artifact_plan on rejection.
      The revision instruction in inputs.user_decision.instruction is mandatory
      feedback to preserve in the regenerated artifact list.
  domain_synthesis: "Run synthesize_domain_logic once after artifact-plan approval. This fills accepted stage bodies in transit before branch_write."
  branch_write: "Write only planned artifacts after domain_synthesis has accepted all generated bodies."
  static_verify: "Run static verification and record evidence."
  smoke_verify: "Run deterministic generated-program smoke verification before live-provider verification."
  live_verify: "Run real-provider verification through the external API."
  rebase_verify: "Rebase on latest target repo state and rerun static verification."
  pr_graduation: "Open the PR after post-rebase verification."
  curator_request: "Prepare a curator request for missing repo wiring."

ingestion:
  user_text: [inputs.user_text]
  user_confirmation:
    - inputs.user_decision
    - inputs.user_decision.decision
    - inputs.user_decision.instruction
    - inputs.user_decision.note_mode
    - inputs.user_decision.timestamp
  system_mode_entry: [inputs.mode_entry]

action_map:
  record_program_target:
    description: "Tool call for capturing program identity. Arguments must be string fields {slug, name, target_dir}; confirms program.target_dir_confirmed."
    arg_descriptions:
      slug: "Lowercase kebab-case program slug."
      name: "Human-readable program name."
      target_dir: "Repository directory where generated files should be written."
    mutations:
      - { op: MSet, path: program.slug, from_arg: slug }
      - { op: MSet, path: program.name, from_arg: name }
      - { op: MSet, path: program.target_dir, from_arg: target_dir }
      - { op: MSet, path: program.target_dir_confirmed, value: true }
    channel: widget_output
  choose_design_path:
    description: "Tool call for selecting intake path after target capture. Argument {choice} must be the string 'default' or 'design'."
    arg_descriptions:
      choice: "Either 'default' for the standard skeleton or 'design' for the six-question interview."
    mutations:
      - { op: MSet, path: program.design_path, from_arg: choice }
    channel: widget_output
  apply_default_skeleton:
    description: "Tool call with no required arguments. Populates intake.* JSON-string scalar fields with the default start->working->complete skeleton."
    mutations:
      - { op: MSet, path: intake.purpose, value: '' }
      - { op: MSet, path: intake.q1_recorded, value: true }
      - { op: MSet, path: intake.entry_channel, value: user_text }
      - { op: MSet, path: intake.q2_recorded, value: true }
      - { op: MSet, path: intake.stages_json, value: '[{"slug":"start","is_bootstrap":true},{"slug":"working"},{"slug":"complete","is_terminal":true}]' }
      - { op: MSet, path: intake.q3_recorded, value: true }
      - { op: MSet, path: intake.transitions_json, value: '[{"from":"start","to":"working","trigger":"auto"},{"from":"working","to":"complete","trigger":"auto","guard_field":"work.example_ready","guard_value":true}]' }
      - { op: MSet, path: intake.q4_recorded, value: true }
      - { op: MSet, path: intake.delegation_json, value: '{}' }
      - { op: MSet, path: intake.q5_recorded, value: true }
      - { op: MSet, path: intake.completion_json, value: '{"final_stage":"complete","guard_field":"work.example_ready"}' }
      - { op: MSet, path: intake.q6_recorded, value: true }
      - { op: MSet, path: intake.program_intake_finalized, value: true }
    channel: widget_output
  ask_design_question:
    description: "Ask the user a single design-interview question (Q1-Q6). Pauses the round; the next round's inputs.user_text carries the answer."
    arg_descriptions:
      question_number: "Which Q is being asked (1-6)."
      question_text: "The question prompt to display to the user."
    mutations:
      - { op: MSet, path: intake.last_question_asked, from_arg: question_number }
      - { op: MSet, path: intake.last_question_text, from_arg: question_text }
    channel: widget_output
  record_q1_purpose:
    description: "Capture the user's answer to Q1 (program purpose). One short paragraph describing what the program does."
    arg_descriptions:
      purpose: "User's answer to Q1: the program purpose."
    mutations:
      - { op: MSet, path: intake.purpose, from_arg: purpose }
      - { op: MSet, path: intake.q1_recorded, value: true }
    channel: widget_output
  record_q2_entry_channel:
    description: "Capture Q2 (entry channel -- how does work arrive: user_text, webhook, scheduled tick, another program delegating)."
    arg_descriptions:
      entry_channel: "User's answer to Q2: how work enters the program."
    mutations:
      - { op: MSet, path: intake.entry_channel, from_arg: entry_channel }
      - { op: MSet, path: intake.q2_recorded, value: true }
    channel: widget_output
  record_q3_stages:
    description: "Capture Q3 (stage list -- the named modes the program transitions through)."
    arg_descriptions:
      stages_json: |
        Provide a JSON-encoded value. The strict format is required for
        downstream synthesis.

        Valid example:
        - Array (Q3 stages_json): "[\"intake\", \"analysis\", \"complete\"]"

        Do NOT HTML-escape the string. Use raw " characters, not &quot;.

        The foundry accepts JSON5-style input as a fallback (unquoted keys,
        bare identifiers), but emits canonical JSON in governed state.
    mutations:
      - { op: MSet, path: intake.stages_json, from_arg: stages_json }
      - { op: MSet, path: intake.q3_recorded, value: true }
    channel: widget_output
  record_q4_transitions:
    description: "Capture Q4 (transition list -- how stages advance, branch, loop, or guard)."
    arg_descriptions:
      transitions_json: |
        Provide a JSON-encoded value. The strict format is required for
        downstream synthesis.

        Valid example:
        - Array (Q4 transitions_json): "[{\"from\":\"intake\",\"to\":\"analysis\",\"guard_field\":\"intake.ready\"}]"

        Do NOT HTML-escape the string. Use raw " characters, not &quot;.

        The foundry accepts JSON5-style input as a fallback (unquoted keys,
        bare identifiers), but emits canonical JSON in governed state.
    mutations:
      - { op: MSet, path: intake.transitions_json, from_arg: transitions_json }
      - { op: MSet, path: intake.q4_recorded, value: true }
    channel: widget_output
  record_q5_delegation:
    description: "Capture Q5 (delegation design -- whether and how work delegates)."
    arg_descriptions:
      delegation_json: |
        Provide a JSON-encoded value. The strict format is required for
        downstream synthesis.

        Valid example:
        - Object (Q5 delegation_json): "{\"enabled\": false, \"target\": \"team-X\"}"

        Do NOT HTML-escape the string. Use raw " characters, not &quot;.

        The foundry accepts JSON5-style input as a fallback (unquoted keys,
        bare identifiers), but emits canonical JSON in governed state.
    mutations:
      - { op: MSet, path: intake.delegation_json, from_arg: delegation_json }
      - { op: MSet, path: intake.q5_recorded, value: true }
    channel: widget_output
  record_q6_completion:
    description: "Capture Q6 (completion criteria -- terminal stage and completion guard)."
    arg_descriptions:
      completion_json: |
        Provide a JSON-encoded value. The strict format is required for
        downstream synthesis.

        Valid example:
        - Object (Q6 completion_json): "{\"final_stage\": \"complete\", \"guard_field\": \"work.done\"}"

        Do NOT HTML-escape the string. Use raw " characters, not &quot;.

        The foundry accepts JSON5-style input as a fallback (unquoted keys,
        bare identifiers), but emits canonical JSON in governed state.
    mutations:
      - { op: MSet, path: intake.completion_json, from_arg: completion_json }
      - { op: MSet, path: intake.q6_recorded, value: true }
    channel: widget_output
  record_program_intake_finalize:
    description: "Final commit of the design interview once all 6 Q-answers are recorded. Idempotent. The LLM should call this immediately after record_q6_completion fires."
    mutations:
      - { op: MSet, path: intake.program_intake_finalized, value: true }
    channel: widget_output
  confirm_design:
    description: "Tool call after explicit user approval. Confirms the proposed mode and transition list before repo_targeting."
    mutations:
      - { op: MSet, path: program.design_confirmed, value: true }
    channel: widget_output
  reject_design_and_revise_q1:
    description: "Reopen design intake from Q1 onward after explicit confirm_design rejection."
    mutations:
      - { op: MSet, path: intake.q1_recorded, value: false }
      - { op: MSet, path: intake.q2_recorded, value: false }
      - { op: MSet, path: intake.q3_recorded, value: false }
      - { op: MSet, path: intake.q4_recorded, value: false }
      - { op: MSet, path: intake.q5_recorded, value: false }
      - { op: MSet, path: intake.q6_recorded, value: false }
      - { op: MSet, path: intake.program_intake_finalized, value: false }
      - { op: MSet, path: program.design_confirmed, value: false }
    channel: widget_output
  reject_design_and_revise_q2:
    description: "Reopen design intake from Q2 onward after explicit confirm_design rejection."
    mutations:
      - { op: MSet, path: intake.q2_recorded, value: false }
      - { op: MSet, path: intake.q3_recorded, value: false }
      - { op: MSet, path: intake.q4_recorded, value: false }
      - { op: MSet, path: intake.q5_recorded, value: false }
      - { op: MSet, path: intake.q6_recorded, value: false }
      - { op: MSet, path: intake.program_intake_finalized, value: false }
      - { op: MSet, path: program.design_confirmed, value: false }
    channel: widget_output
  reject_design_and_revise_q3:
    description: "Reopen design intake for Q3 after explicit confirm_design rejection while preserving later recorded answers."
    mutations:
      - { op: MSet, path: intake.q3_recorded, value: false }
      - { op: MSet, path: program.design_confirmed, value: false }
    channel: widget_output
  reject_design_and_revise_q4:
    description: "Reopen design intake from Q4 onward after explicit confirm_design rejection."
    mutations:
      - { op: MSet, path: intake.q4_recorded, value: false }
      - { op: MSet, path: intake.q5_recorded, value: false }
      - { op: MSet, path: intake.q6_recorded, value: false }
      - { op: MSet, path: intake.program_intake_finalized, value: false }
      - { op: MSet, path: program.design_confirmed, value: false }
    channel: widget_output
  reject_design_and_revise_q5:
    description: "Reopen design intake from Q5 onward after explicit confirm_design rejection."
    mutations:
      - { op: MSet, path: intake.q5_recorded, value: false }
      - { op: MSet, path: intake.q6_recorded, value: false }
      - { op: MSet, path: intake.program_intake_finalized, value: false }
      - { op: MSet, path: program.design_confirmed, value: false }
    channel: widget_output
  reject_design_and_revise_q6:
    description: "Reopen design intake from Q6 onward after explicit confirm_design rejection."
    mutations:
      - { op: MSet, path: intake.q6_recorded, value: false }
      - { op: MSet, path: intake.program_intake_finalized, value: false }
      - { op: MSet, path: program.design_confirmed, value: false }
    channel: widget_output
  record_user_note: { description: "Record a notebook note.", mutations: [{ op: MAppend, path: notebook.entries, from_arg: note }], channel: widget_output }
  pin_notebook_note: { description: "Pin a notebook note for next-turn projection.", mutations: [{ op: MAppend, path: notebook.pins, from_arg: key }], channel: widget_output }
  confirm_research_scope:
    description: "Confirm discretionary web research for the current mandate."
    mutations:
      - { op: MSet, path: intake.research_confirmed, value: true }
      - { op: MSet, path: intake.research_allowed, value: true }
      - { op: MSet, path: intake.user_research_authorized, value: true }
    channel: widget_output
  record_user_requested_research:
    description: "Record user-requested research as authorized."
    mutations:
      - { op: MSet, path: intake.user_requested_research, value: true }
      - { op: MSet, path: intake.research_allowed, value: true }
      - { op: MSet, path: intake.user_research_authorized, value: true }
      - { op: MAppend, path: research.queries, from_arg: query }
    channel: widget_output
  web_research: { description: "Run user-confirmed web research.", mutations: [], channel: widget_output }
  session_new: { description: "Control-plane new session command.", mutations: [], channel: widget_output }
  session_abort_current: { description: "Control-plane abort current session command.", mutations: [], channel: widget_output }
  session_status: { description: "Control-plane status command.", mutations: [], channel: widget_output }
  session_history: { description: "Control-plane history command.", mutations: [], channel: widget_output }
  session_resume: { description: "Control-plane resume command.", mutations: [], channel: widget_output }
  session_help: { description: "Control-plane help command.", mutations: [], channel: widget_output }
  select_repo_target:
    description: "Select standalone or existing-repo target."
    arg_descriptions:
      target_kind: "Either 'standalone_repo' for a new generated repo or 'existing_repo' for attachment to a repo with .pgas/wiring.yml."
    mutations:
      - { op: MSet, path: repo.target_kind, from_arg: target_kind }
      - { op: MSet, path: repo.write_authorized, value: false }
      - { op: MSet, path: repo.blocked, value: false }
    channel: widget_output
  authorize_standalone_target:
    description: "Authorize standalone repo writes after target selection."
    mutations:
      - { op: MSet, path: repo.target_kind, value: standalone_repo }
      - { op: MSet, path: repo.write_authorized, value: true }
      - { op: MSet, path: repo.blocked, value: false }
      - { op: MSet, path: repo.wiring_manifest.status, value: not_required }
    channel: widget_output
  load_wiring_manifest:
    description: "Load and validate fixed .pgas/wiring.yml for existing-repo writes."
    arg_descriptions:
      repo_root: "The absolute path to the existing repository root. Read this from program.target_dir in the current state."
    mutations:
      - { op: MSet, path: repo.target_kind, value: existing_repo }
      - { op: MSet, path: repo.wiring_manifest.repo_root, from_arg: repo_root }
      - { op: MSet, path: repo.wiring_manifest.status, value: valid }
      - { op: MSet, path: repo.wiring_manifest.path, value: .pgas/wiring.yml }
      - { op: MSet, path: repo.blocked, value: false }
      - { op: MSet, path: repo.write_authorized, value: true }
    channel: widget_output
  authorize_existing_repo_target:
    description: "Authorize existing-repo writes after fixed manifest validation."
    mutations:
      - { op: MSet, path: repo.write_authorized, value: true }
    channel: widget_output
  create_curator_request:
    description: "Prepare a repo curator request."
    mutations: [{ op: MSet, path: repo.curator_request_lodged, value: true }]
    channel: widget_output
  design_architecture:
    description: "Mark architecture ready."
    mutations: [{ op: MSet, path: program.architecture_ready, value: true }]
    channel: widget_output
  synthesize_program_spec:
    description: "Run the mechanical synthesizer (no LLM call). Writes the spec to in-process transit; flips program.synthesis_complete."
    channel: widget_output
    mutations:
      - { op: MSet, path: program.synthesis_complete, value: true }
  plan_artifacts:
    description: |
      INTERNAL: Auto-fires exactly ONCE on system_mode_entry into scaffold_plan
      to draft the artifact plan. Do NOT call this in response to /approve —
      the user-driven approval action is approve_artifact_plan. Its precondition
      forbids re-firing after artifact_plan.status is set.
    result_path: artifact_plan.artifacts
    mutations:
      - { op: MSet, path: artifact_plan.status, value: draft }
      - { op: MSet, path: artifact_plan.approved, value: false }
      - { op: MSet, path: artifact_plan.write_authorized, value: false }
    channel: artifact_plan_output
  approve_artifact_plan:
    description: |
      USER-DRIVEN: Fires when the user types /approve to authorize the
      drafted artifact plan. This is the ONLY tool to call in scaffold_plan
      when receiving inputs.user_decision.decision='approve'. Sets
      artifact_plan.status='approved' and triggers the write_scaffold_artifacts
      transition.
    mutations:
      - { op: MSet, path: artifact_plan.status, value: approved }
      - { op: MSet, path: artifact_plan.approved, value: true }
      - { op: MSet, path: artifact_plan.write_authorized, value: true }
    channel: widget_output
  revise_artifact_plan:
    description: |
      USER-DRIVEN: Fires when the user types /reject in scaffold_plan to
      revise the drafted artifact plan. This is the ONLY tool to call in
      scaffold_plan when receiving inputs.user_decision.decision='reject'.
      Re-runs deterministic artifact planning, preserves user-required
      artifacts from intake/notebook/rejection feedback, and keeps the plan
      unapproved until a later /approve.
    result_path: artifact_plan.artifacts
    mutations:
      - { op: MSet, path: artifact_plan.status, value: draft }
      - { op: MSet, path: artifact_plan.approved, value: false }
      - { op: MSet, path: artifact_plan.write_authorized, value: false }
    channel: artifact_plan_output
  synthesize_domain_logic:
    description: |
      Run per-stage domain-logic synthesis against the frozen generated
      contracts. The handler stores accepted stage bodies in transit; the
      engine lands the stage-local audit at domain_synthesis.audit.
    result_path: domain_synthesis.audit
    mutations:
      - { op: MSet, path: program.domain_synthesis_complete, value: true }
    channel: domain_synthesis_output
  write_scaffold_artifacts: { description: "Write planned artifacts.", mutations: [{ op: MSet, path: artifacts.written, value: true }], channel: widget_output }
  git_status: { description: "Read git status.", mutations: [], channel: widget_output }
  npm_install: { description: "Install dependencies.", mutations: [], channel: widget_output }
  npm_typecheck: { description: "Run typecheck.", mutations: [], channel: widget_output }
  npm_test: { description: "Run tests.", mutations: [], channel: widget_output }
  run_static_verification:
    description: "Record static verification evidence."
    mutations:
      - { op: MSet, path: graduation.static_verification, from_arg: status }
      - { op: MSet, path: graduation.static_evidence_id, from_arg: evidence_id }
    channel: widget_output
  run_parallel_static_checks:
    description: |
      OPTIONAL parallel fan-out. Packs independent static checks (import
      boundary, declared-mode terminal reachability, evidence shape) into ONE
      action whose children run CONCURRENTLY and aggregate into a single
      combined envelope at graduation.composite_checks. The single-call
      npm_typecheck / npm_test / run_static_verification actions remain the
      DEFAULT — only pack here when you deliberately want the parallel combined
      result. Provide the inputs to check under the action payload
      (imports[], modes[], evidence{status,evidence_id}); the envelope's
      `status` is succeeded when every child passes and partial when any child
      fails, with per-child results under `children`.
    result_path: graduation.composite_checks
    mutations: []
    channel: composite_checks_output
  run_smoke_verification:
    description: "Run deterministic generated-program smoke verification and record evidence."
    mutations:
      - { op: MSet, path: graduation.smoke_verification, from_arg: status }
      - { op: MSet, path: graduation.smoke_evidence_id, from_arg: evidence_id }
    channel: widget_output
  confirm_live_provider_intent:
    description: "Confirm user-selected live-provider graduation after static verification."
    mutations:
      - { op: MSet, path: graduation.live_provider_intent, value: true }
      - { op: MSet, path: graduation.ready_for_live, value: true }
    channel: widget_output
  run_api_blackbox_verification: { description: "Run black-box API verification.", mutations: [], channel: widget_output }
  run_live_provider_verification:
    description: "Record live provider verification evidence."
    mutations:
      - { op: MSet, path: graduation.live_verification, from_arg: status }
      - { op: MSet, path: graduation.live_evidence_id, from_arg: evidence_id }
    channel: widget_output
  git_rebase_latest:
    description: "Rebase on latest target repo state and record rebase status."
    mutations:
      - { op: MSet, path: graduation.rebase_status, from_arg: status }
      - { op: MSet, path: graduation.rebase_evidence_id, from_arg: evidence_id }
    channel: widget_output
  run_rebase_static_verification:
    description: "Record post-rebase static verification evidence."
    mutations:
      - { op: MSet, path: graduation.rebase_verification, from_arg: status }
      - { op: MSet, path: graduation.rebase_static_evidence_id, from_arg: evidence_id }
    channel: widget_output
  open_pull_request: { description: "Open pull request.", mutations: [], channel: widget_output }

reactions:
  debug_approve_artifact_plan_preconditions:
    event: AfterIngestion
    watch:
      - repo.write_authorized
      - program.synthesis_complete
      - artifact_plan.status
      - artifact_plan.approved
      - inputs.user_decision.decision
    write_scope:
      - debug.approve_artifact_plan_preconditions_checked
  normalize_intake_json_fields:
    event: AfterMutation
    watch:
      - intake.q3_recorded
      - intake.q4_recorded
      - intake.q5_recorded
      - intake.q6_recorded
    write_scope:
      - intake.stages_json
      - intake.transitions_json
      - intake.delegation_json
      - intake.completion_json

