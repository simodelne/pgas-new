fallback:
  channel: widget_output
  payload: { ok: false }

guidance:
  intake_intelligence:
    - "Every round must emit exactly one native tool_call from the current mode vocabulary. Do NOT output free-form question text as assistant message content; the engine parses uncalled content as an invalid empty-name action."
    - "If program.target_dir_confirmed is not true: first capture program identity. The CLI may have pre-filled program.slug, program.name, or program.target_dir via initialDomain. If slug is provided but name is missing, derive name as title-case of slug. If target_dir is blank, default to './<slug>'. When slug/name/target_dir are known, call record_program_target with slug, name, and target_dir."
    - "After record_program_target, if program.design_path is not set, call choose_design_path with choice='design' when the user asked to design the program or choice='default' when the user asked for the default skeleton."
    - "If program.design_path == 'default' and intake.program_intake_finalized is not true: immediately call apply_default_skeleton. Do NOT ask Q1-Q6."
    - "Design interview enforcement (Q1-Q6): The engine enforces strict left-to-right ordering via per-question preconditions. You CANNOT skip ahead. For each question: 1. Call ask_design_question with question_number (1..6) and question_text. The engine pauses. 2. The user's answer arrives via user_text on the next round. 3. Fire the corresponding record_qN_<topic> action with the user's answer parsed into that action's named argument. 4. Move to the next question. After Q6 fires, immediately fire record_program_intake_finalize. Do NOT attempt to batch multiple answers into one action. Do NOT attempt to fire record_program_intake_finalize before all six qN_recorded flags are true -- the engine will reject it."
    - "If program.design_path == 'design' and intake.program_intake_finalized is not true: ask the 6 design questions IN ORDER, one question per round, with brief context for each. Call ask_design_question for the question round; wait for the user's answer in inputs.user_text before recording exactly that answer via the next record_qN_<topic> action. Order matters."
    - "Q1 Purpose — one sentence on what the program does. Default if skipped: '<program-name>-driven workflow agent'."
    - "Q2 Entry channel — how does work arrive? (user_text, webhook, scheduled tick, another program delegating). Default if skipped: 'user_text'."
    - "Q3 Stages of work — distinct stages, named in order; these become the mode names. Default if skipped: ['start', 'working', 'complete']."
    - "Q4 Decision points — branches, loops, bail-outs; these become extra transitions, optionally with guards. Default if skipped: no extra transitions."
    - "Q5 Delegation — does any stage delegate to a child session / another program? Default if skipped: 'none'."
    - "Q6 Completion criteria — how do you know the program is done? Default if skipped: terminal mode = last stage, guard = 'work.example_ready'."
    - "If the user replies 'skip' to any Q1-Q6 dimension, record the skip in program.skip_dimensions and use the dimension's default in the JSON-string scalar fields."
    - "For Q3-Q6, the *_json arguments must be JSON-string scalar fields, not nested arrays or objects."
    - "After intake is finalized via apply_default_skeleton OR record_program_intake_finalize, echo back the proposed mode list + transitions + target_dir as plain text (intent='confirm_design') and instruct the user to type /approve or /reject. Wait for the user_confirmation trigger."
    - "When you need user approval (e.g., before confirm_design or approve_artifact_plan), instruct the user to type /approve or /reject (with optional follow-up instruction). The REPL routes these to the user_confirmation channel with structured payload. Do NOT accept plain text replies as approvals."
    - "On user_confirmation with decision='approve', call confirm_design."
    - "On user_confirmation with decision='reject' and instruction naming Q1, Q2, Q3, Q4, Q5, or Q6, first call the matching reject_design_and_revise_qN action (for example reject_design_and_revise_q3 for Q3). Re-ask/record that Q and then re-emit the confirm_design echo-back; preserve later recorded answers unless the user explicitly asks to revise them."
    - "Don't re-ask anything you already extracted from the user's free-text introduction."
  repo_targeting:
    - "This mode is mandatory between confirm_design and architecture_design; do not skip it."
    - "If program.target_dir is set and the target is standalone/no .pgas/wiring.yml is known, call authorize_standalone_target. That action sets repo.target_kind='standalone_repo' and repo.write_authorized=true."
    - "If program.target_dir points to an existing repo with .pgas/wiring.yml, call load_wiring_manifest with repo_root=program.target_dir, then call authorize_existing_repo_target after the manifest status is valid."
    - "Only leave repo_targeting after repo.write_authorized is true; the transition to architecture_design is guarded on that field."
  scaffold_plan:
    - "Only call plan_artifacts on system_mode_entry to produce the artifact plan from the synthesized spec in in-process transit after repo.write_authorized and program.synthesis_complete are true and artifact_plan.status is still unset. If the handler reports the spec is missing from transit, call synthesize_program_spec again; the synthesizer is mechanical and idempotent."
    - "Echo the artifact-plan list (paths + purposes) to the user as plain text and instruct them to type /approve or /reject."
    - "When you need user approval (e.g., before confirm_design or approve_artifact_plan), instruct the user to type /approve or /reject (with optional follow-up instruction). The REPL routes these to the user_confirmation channel with structured payload. Do NOT accept plain text replies as approvals."
    - "On user_confirmation decision='approve' with artifact_plan.status='draft' and artifact_plan.approved false, call approve_artifact_plan. Do NOT call plan_artifacts on an approval trigger. Then the transition to domain_synthesis fires."
    - "On user_confirmation decision=reject with artifact_plan.status='draft' and artifact_plan.approved false, call revise_artifact_plan. Do NOT call approve_artifact_plan on a rejection. The revised artifact plan must preserve explicit user-required paths from inputs.user_decision.instruction, notebook notes, and the intake dossier, then stay in scaffold_plan for a later /approve."
  domain_synthesis:
    - "On system_mode_entry after artifact_plan.status='approved', call synthesize_domain_logic exactly once. This runs per-stage generate/verify/repair against the frozen contracts and hard-fails instead of producing stubs."
    - "Do not call write_scaffold_artifacts from this mode. Wait for program.domain_synthesis_complete to transition to branch_write."
  architecture_design:
    - "On entering architecture_design after confirm_design, call synthesize_program_spec. The handler performs mechanical synthesis with no LLM call, writes the YAML to in-process transit for this session, and flips program.synthesis_complete via the action-map mutation."
    - "After synthesize_program_spec succeeds, transition to scaffold_plan. If the foundry server restarted and downstream planning reports missing transit state, re-run synthesize_program_spec; same intake produces the same YAML."

control_plane:
  version: 1
  session:
    program: "pgas-new"
    binding: identity_channel_program
    concurrency:
      policy: single_active
      on_busy: reject_with_status
  free_text:
    control: ask
    bind:
      query: "$text"
  controls:
    ask:
      title: Ask
      aliases: ["/ask"]
      args:
        query:
          type: string
          required: true
          capture: rest
      dispatch:
        - op: create_session
          as: session
          program: "pgas-new"
          domain_context:
            query: "$args.query"
        - op: trigger
          session: "$session.id"
          channel: user_text
          payload: "$args.query"
          mode: async
    approve_artifact_plan:
      title: Approve current gate
      aliases: ["/approve"]
      availability:
        when: "active_session"
      dispatch:
        - op: trigger
          session: "$active_session.id"
          channel: user_confirmation
          payload:
            decision: approve
          mode: async
      presentation:
        priority: primary
    confirm_design:
      title: Confirm design intake
      availability:
        when: "active_session"
      dispatch:
        - op: trigger
          session: "$active_session.id"
          channel: user_confirmation
          payload:
            decision: approve
          mode: async
      presentation:
        priority: contextual
    reject_design_and_revise_q1:
      title: Reject and revise Q1
