name: "pgas-new"
termination: BoundedSession
topology: CyclicTopology
pure: true

preamble: |
  Program: PGAS New. You create PGAS programs through governed modes,
  explicit artifact planning, repo-curator wiring manifests, and static
  then live verification. Use only the current mode vocabulary and keep
  user decisions in the notebook-backed domain.

initial: intake_intelligence
terminal: [pr_graduation]

features:
  - base
  - runtime_control

channels:
  user_text: { direction: In, sync: Async }
  user_confirmation: { direction: In, sync: Async, structured_decision: true }
  system_mode_entry: { direction: In, sync: Async }
  widget_output: { direction: Out, sync: Async }

modes:
  intake_intelligence:
    vocabulary: [record_program_target, choose_design_path, apply_default_skeleton, record_program_intake, confirm_design, record_user_note, pin_notebook_note, confirm_research_scope, record_user_requested_research, web_research, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [user_text, user_confirmation, system_mode_entry, widget_output]
    preconditions:
      record_program_target:
        - { kind: FieldFalsy, path: program.target_dir_confirmed }
      choose_design_path:
        - { kind: FieldTruthy, path: program.target_dir_confirmed }
        - { kind: FieldFalsy, path: program.design_path }
      apply_default_skeleton:
        - { kind: FieldEquals, path: program.design_path, value: default }
        - { kind: FieldFalsy, path: intake.program_intake_recorded }
      record_program_intake:
        - { kind: FieldEquals, path: program.design_path, value: design }
        - { kind: FieldFalsy, path: intake.program_intake_recorded }
      confirm_design:
        - { kind: FieldTruthy, path: intake.program_intake_recorded }
        - { kind: FieldTruthy, path: program.target_dir_confirmed }
        - { kind: FieldFalsy, path: program.design_confirmed }
        - { kind: TriggerType, triggerSet: [user_confirmation] }
        - { kind: FieldEquals, path: inputs.user_decision.decision, value: approve }
      web_research:
        - { kind: FieldTruthy, path: intake.user_research_authorized }
    transitions:
      - target: architecture_design
        guard: { kind: FieldTruthy, path: program.design_confirmed }
      - target: repo_targeting
        guard: { kind: FieldTruthy, path: repo.target_kind }
  repo_targeting:
    vocabulary: [select_repo_target, authorize_standalone_target, load_wiring_manifest, authorize_existing_repo_target, create_curator_request, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [system_mode_entry, widget_output]
    preconditions:
      authorize_standalone_target:
        - { kind: FieldEquals, path: repo.target_kind, value: standalone_repo }
      load_wiring_manifest:
        - { kind: FieldEquals, path: repo.target_kind, value: existing_repo }
      authorize_existing_repo_target:
        - { kind: FieldEquals, path: repo.target_kind, value: existing_repo }
        - { kind: FieldEquals, path: repo.wiring_manifest.status, value: valid }
        - { kind: FieldEquals, path: repo.wiring_manifest.path, value: .pgas/wiring.yml }
    transitions:
      - target: architecture_design
        guard: { kind: FieldTruthy, path: repo.write_authorized }
      - target: curator_request
        guard: { kind: FieldTruthy, path: repo.blocked }
  architecture_design:
    vocabulary: [synthesize_program_spec, design_architecture, record_user_note, web_research, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [system_mode_entry, widget_output]
    preconditions:
      synthesize_program_spec:
        - { kind: FieldTruthy, path: program.design_confirmed }
      web_research:
        - { kind: FieldTruthy, path: intake.user_research_authorized }
    transitions:
      - target: scaffold_plan
        guard: { kind: FieldTruthy, path: program.synthesis_complete }
  scaffold_plan:
    vocabulary: [plan_artifacts, approve_artifact_plan, create_curator_request, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [user_confirmation, system_mode_entry, widget_output]
    preconditions:
      approve_artifact_plan:
        - { kind: FieldTruthy, path: repo.write_authorized }
        - { kind: FieldTruthy, path: program.synthesis_complete }
        - { kind: FieldEquals, path: artifact_plan.status, value: draft }
        - { kind: FieldFalsy, path: artifact_plan.approved }
        - { kind: TriggerType, triggerSet: [user_confirmation] }
        - { kind: FieldEquals, path: inputs.user_decision.decision, value: approve }
    transitions:
      - target: branch_write
        guard: { kind: FieldEquals, path: artifact_plan.status, value: approved }
  branch_write:
    vocabulary: [write_scaffold_artifacts, git_status, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [system_mode_entry, widget_output]
    preconditions:
      write_scaffold_artifacts:
        - { kind: FieldEquals, path: artifact_plan.status, value: approved }
        - { kind: FieldTruthy, path: artifact_plan.write_authorized }
    transitions:
      - target: static_verify
        guard: { kind: FieldTruthy, path: artifacts.written }
  static_verify:
    vocabulary: [npm_install, npm_typecheck, npm_test, run_static_verification, confirm_live_provider_intent, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [system_mode_entry, widget_output]
    preconditions:
      confirm_live_provider_intent:
        - { kind: FieldEquals, path: graduation.static_verification, value: passed }
    transitions:
      - target: live_verify
        guard: { kind: FieldTruthy, path: graduation.ready_for_live }
  live_verify:
    vocabulary: [run_api_blackbox_verification, run_live_provider_verification, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [system_mode_entry, widget_output]
    preconditions:
      run_api_blackbox_verification:
        - { kind: FieldTruthy, path: graduation.live_provider_intent }
      run_live_provider_verification:
        - { kind: FieldTruthy, path: graduation.live_provider_intent }
    transitions:
      - target: rebase_verify
        guard: { kind: FieldEquals, path: graduation.live_verification, value: passed }
  rebase_verify:
    vocabulary: [git_status, git_rebase_latest, run_rebase_static_verification, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [system_mode_entry, widget_output]
    preconditions:
      run_rebase_static_verification:
        - { kind: FieldEquals, path: graduation.rebase_status, value: passed }
    transitions:
      - target: pr_graduation
        guard: { kind: FieldEquals, path: graduation.rebase_verification, value: passed }
  pr_graduation:
    vocabulary: [open_pull_request, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [system_mode_entry, widget_output]
  curator_request:
    vocabulary: [create_curator_request, record_user_note, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [system_mode_entry, widget_output]
    transitions:
      - target: repo_targeting
        guard: { kind: FieldTruthy, path: repo.curator_request_lodged }

proceed_to:
  authorize_standalone_target: architecture_design
  authorize_existing_repo_target: architecture_design
  design_architecture: scaffold_plan
  synthesize_program_spec: scaffold_plan
  confirm_design: architecture_design
  approve_artifact_plan: branch_write
  write_scaffold_artifacts: static_verify
  confirm_live_provider_intent: live_verify
  run_live_provider_verification: rebase_verify
  run_rebase_static_verification: pr_graduation

projection:
  intake_intelligence:
    include:
      - inputs.user_text
      - inputs.user_decision
      - inputs.user_decision.decision
      - inputs.user_decision.instruction
      - inputs.user_decision.note_mode
      - inputs.user_decision.timestamp
      - intake.mandate
      - intake.research_allowed
      - intake.research_confirmed
      - intake.user_requested_research
      - intake.purpose
      - intake.entry_channel
      - intake.stages_json
      - intake.transitions_json
      - intake.delegation_json
      - intake.completion_json
      - intake.program_intake_recorded
      - program.slug
      - program.name
      - program.target_dir
      - program.target_dir_confirmed
      - program.design_path
      - program.design_confirmed
      - program.skip_dimensions
      - notebook.entries
      - notebook.pins
    exclude: []
  repo_targeting:
    include: [repo.target_kind, repo.wiring_manifest.status, repo.wiring_manifest.path, repo.wiring_manifest_json, repo.allowed_imports, repo.write_authorized, repo.required_facilities_missing]
    exclude: []
  architecture_design:
    include: [program.slug, program.name, program.target_dir, program.runtime, program.design_confirmed, program.synthesis_complete]
    exclude: []
  scaffold_plan:
    include: [program.slug, program.name, program.target_dir, program.synthesis_complete, artifact_plan.status, artifact_plan.approved, artifact_plan.write_authorized]
    exclude: []
  branch_write:
    include: [program.slug, program.name, program.target_dir, repo.target_kind, program.synthesis_complete, artifact_plan.status, artifact_plan.write_authorized, artifacts.written, artifacts.generated_paths]
    exclude: []
  static_verify:
    include: [program.target_dir, graduation.static_verification, graduation.static_evidence_id, graduation.live_provider_intent, graduation.ready_for_live]
    exclude: []
  live_verify:
    include: [program.target_dir, graduation.live_verification, graduation.live_provider_intent, graduation.live_evidence_id]
    exclude: []
  rebase_verify:
    include: [program.target_dir, graduation.rebase_status, graduation.rebase_evidence_id, graduation.rebase_verification, graduation.rebase_static_evidence_id]
    exclude: []
  pr_graduation:
    include: [program.target_dir, graduation.rebase_verification]
    exclude: []
  curator_request:
    include: [program.slug, repo.curator_request_lodged, repo.wiring_manifest_json, repo.required_facilities_missing, curator_requests.requests]
    exclude: []

prompts:
  intake_intelligence: "Capture mandate, notebook notes, and confirmed research scope."
  repo_targeting: "Validate target mode and fixed .pgas/wiring.yml if attaching to an existing repo."
  architecture_design: "Run the deterministic program-spec synthesizer."
  scaffold_plan: "Create and approve the artifact plan before writes."
  branch_write: "Write only planned artifacts."
  static_verify: "Run static verification and record evidence."
  live_verify: "Run real-provider verification through the external API."
  rebase_verify: "Rebase on latest target repo state and rerun static verification."
  pr_graduation: "Open the PR after post-rebase verification."
  curator_request: "Prepare a curator request for missing repo wiring."

ingestion:
  user_text: [inputs.user_text]
  user_confirmation:
    - inputs.user_decision
    - inputs.user_decision.decision
    - inputs.user_decision.instruction
    - inputs.user_decision.note_mode
    - inputs.user_decision.timestamp
  system_mode_entry: [inputs.mode_entry]

action_map:
  record_program_target:
    description: "Capture the user's program name, slug, and target output directory."
    mutations:
      - { op: MSet, path: program.slug, from_arg: slug }
      - { op: MSet, path: program.name, from_arg: name }
      - { op: MSet, path: program.target_dir, from_arg: target_dir }
      - { op: MSet, path: program.target_dir_confirmed, value: true }
    channel: widget_output
  choose_design_path:
    description: "Record whether the user wants the design interview or the default skeleton."
    mutations:
      - { op: MSet, path: program.design_path, from_arg: choice }
    channel: widget_output
  apply_default_skeleton:
    description: "Populate intake.* JSON-string scalar fields with the default start->working->complete skeleton."
    mutations:
      - { op: MSet, path: intake.purpose, value: '' }
      - { op: MSet, path: intake.entry_channel, value: user_text }
      - { op: MSet, path: intake.stages_json, value: '[{"slug":"start","is_bootstrap":true},{"slug":"working"},{"slug":"complete","is_terminal":true}]' }
      - { op: MSet, path: intake.transitions_json, value: '[{"from":"start","to":"working","trigger":"auto"},{"from":"working","to":"complete","trigger":"auto","guard_field":"work.example_ready","guard_value":true}]' }
      - { op: MSet, path: intake.delegation_json, value: '{}' }
      - { op: MSet, path: intake.completion_json, value: '{"final_stage":"complete","guard_field":"work.example_ready"}' }
      - { op: MSet, path: intake.program_intake_recorded, value: true }
    channel: widget_output
  record_program_intake:
    description: "Capture the user's Q1-Q6 design interview answers into governed JSON-string scalar state."
    mutations:
      - { op: MSet, path: intake.purpose, from_arg: purpose }
      - { op: MSet, path: intake.entry_channel, from_arg: entry_channel }
      - { op: MSet, path: intake.stages_json, from_arg: stages_json }
      - { op: MSet, path: intake.transitions_json, from_arg: transitions_json }
      - { op: MSet, path: intake.delegation_json, from_arg: delegation_json }
      - { op: MSet, path: intake.completion_json, from_arg: completion_json }
      - { op: MSet, path: intake.program_intake_recorded, value: true }
    channel: widget_output
  confirm_design:
    description: "User-confirm the proposed mode and transition list before architecture_design."
    mutations:
      - { op: MSet, path: program.design_confirmed, value: true }
    channel: widget_output
  record_user_note: { description: "Record a notebook note.", mutations: [{ op: MAppend, path: notebook.entries, from_arg: note }], channel: widget_output }
  pin_notebook_note: { description: "Pin a notebook note for next-turn projection.", mutations: [{ op: MAppend, path: notebook.pins, from_arg: key }], channel: widget_output }
  confirm_research_scope:
    description: "Confirm discretionary web research for the current mandate."
    mutations:
      - { op: MSet, path: intake.research_confirmed, value: true }
      - { op: MSet, path: intake.research_allowed, value: true }
      - { op: MSet, path: intake.user_research_authorized, value: true }
    channel: widget_output
  record_user_requested_research:
    description: "Record user-requested research as authorized."
    mutations:
      - { op: MSet, path: intake.user_requested_research, value: true }
      - { op: MSet, path: intake.research_allowed, value: true }
      - { op: MSet, path: intake.user_research_authorized, value: true }
      - { op: MAppend, path: research.queries, from_arg: query }
    channel: widget_output
  web_research: { description: "Run user-confirmed web research.", mutations: [], channel: widget_output }
  session_new: { description: "Control-plane new session command.", mutations: [], channel: widget_output }
  session_abort_current: { description: "Control-plane abort current session command.", mutations: [], channel: widget_output }
  session_status: { description: "Control-plane status command.", mutations: [], channel: widget_output }
  session_history: { description: "Control-plane history command.", mutations: [], channel: widget_output }
  session_resume: { description: "Control-plane resume command.", mutations: [], channel: widget_output }
  session_help: { description: "Control-plane help command.", mutations: [], channel: widget_output }
  select_repo_target:
    description: "Select standalone or existing-repo target."
    mutations:
      - { op: MSet, path: repo.target_kind, from_arg: target_kind }
      - { op: MSet, path: repo.write_authorized, value: false }
      - { op: MSet, path: repo.blocked, value: false }
    channel: widget_output
  authorize_standalone_target:
    description: "Authorize standalone repo writes after target selection."
    mutations:
      - { op: MSet, path: repo.write_authorized, value: true }
      - { op: MSet, path: repo.wiring_manifest.status, value: not_required }
    channel: widget_output
  load_wiring_manifest:
    description: "Load and validate fixed .pgas/wiring.yml for existing-repo writes."
    mutations:
      - { op: MSet, path: repo.wiring_manifest.status, value: valid }
      - { op: MSet, path: repo.wiring_manifest.path, value: .pgas/wiring.yml }
      - { op: MSet, path: repo.blocked, value: false }
      - { op: MSet, path: repo.write_authorized, value: true }
    channel: widget_output
  authorize_existing_repo_target:
    description: "Authorize existing-repo writes after fixed manifest validation."
    mutations:
      - { op: MSet, path: repo.write_authorized, value: true }
    channel: widget_output
  create_curator_request:
    description: "Prepare a repo curator request."
    mutations: [{ op: MSet, path: repo.curator_request_lodged, value: true }]
    channel: widget_output
  design_architecture:
    description: "Mark architecture ready."
    mutations: [{ op: MSet, path: program.architecture_ready, value: true }]
    channel: widget_output
  synthesize_program_spec:
    description: "Run the mechanical synthesizer (no LLM call). Writes the spec to in-process transit; flips program.synthesis_complete."
    channel: widget_output
    mutations:
      - { op: MSet, path: program.synthesis_complete, value: true }
  plan_artifacts:
    description: "Plan artifacts."
    mutations:
      - { op: MSet, path: artifact_plan.status, value: draft }
      - { op: MSet, path: artifact_plan.approved, value: false }
      - { op: MSet, path: artifact_plan.write_authorized, value: false }
    channel: widget_output
  approve_artifact_plan:
    description: "Approve artifact plan after write authorization."
    mutations:
      - { op: MSet, path: artifact_plan.status, value: approved }
      - { op: MSet, path: artifact_plan.approved, value: true }
      - { op: MSet, path: artifact_plan.write_authorized, value: true }
    channel: widget_output
  write_scaffold_artifacts: { description: "Write planned artifacts.", mutations: [{ op: MSet, path: artifacts.written, value: true }], channel: widget_output }
  git_status: { description: "Read git status.", mutations: [], channel: widget_output }
  npm_install: { description: "Install dependencies.", mutations: [], channel: widget_output }
  npm_typecheck: { description: "Run typecheck.", mutations: [], channel: widget_output }
  npm_test: { description: "Run tests.", mutations: [], channel: widget_output }
  run_static_verification:
    description: "Record static verification evidence."
    mutations:
      - { op: MSet, path: graduation.static_verification, from_arg: status }
      - { op: MSet, path: graduation.static_evidence_id, from_arg: evidence_id }
    channel: widget_output
  confirm_live_provider_intent:
    description: "Confirm user-selected live-provider graduation after static verification."
    mutations:
      - { op: MSet, path: graduation.live_provider_intent, value: true }
      - { op: MSet, path: graduation.ready_for_live, value: true }
    channel: widget_output
  run_api_blackbox_verification: { description: "Run black-box API verification.", mutations: [], channel: widget_output }
  run_live_provider_verification:
    description: "Record live provider verification evidence."
    mutations:
      - { op: MSet, path: graduation.live_verification, from_arg: status }
      - { op: MSet, path: graduation.live_evidence_id, from_arg: evidence_id }
    channel: widget_output
  git_rebase_latest:
    description: "Rebase on latest target repo state and record rebase status."
    mutations:
      - { op: MSet, path: graduation.rebase_status, from_arg: status }
      - { op: MSet, path: graduation.rebase_evidence_id, from_arg: evidence_id }
    channel: widget_output
  run_rebase_static_verification:
    description: "Record post-rebase static verification evidence."
    mutations:
      - { op: MSet, path: graduation.rebase_verification, from_arg: status }
      - { op: MSet, path: graduation.rebase_static_evidence_id, from_arg: evidence_id }
    channel: widget_output
  open_pull_request: { description: "Open pull request.", mutations: [], channel: widget_output }

schema:
  inputs.user_text: string
  inputs.user_decision: object
  inputs.user_decision.decision: string
  inputs.user_decision.instruction: string
  inputs.user_decision.note_mode: string
  inputs.user_decision.timestamp: string
  inputs.mode_entry: object
  inputs.mode_entry.mode: string
  inputs.mode_entry.from_mode: string
  inputs.mode_entry.entry_round: number
  intake.mandate: string
  intake.purpose: string
  intake.entry_channel: string
  intake.stages_json: string
  intake.transitions_json: string
  intake.delegation_json: string
  intake.completion_json: string
  intake.program_intake_recorded: boolean
  intake.research_confirmed: boolean
  intake.user_requested_research: boolean
  intake.research_allowed: boolean
  intake.user_research_authorized: boolean
  notebook.entries: array
  notebook.pins: array
  research.queries: array
  research.completed: boolean
  repo.target_kind: string
  repo.blocked: boolean
  repo.write_authorized: boolean
  repo.curator_request_lodged: boolean
  repo.wiring_manifest.status: string
  repo.wiring_manifest.path: string
  repo.wiring_manifest_json: string
  repo.allowed_imports: array
  repo.allowed_imports.*: string
  repo.required_facilities_missing: array
  program.runtime: string
  program.slug: string
  program.name: string
  program.design_path: string
  program.design_confirmed: boolean
  program.synthesis_complete: boolean
  program.target_dir: string
  program.target_dir_confirmed: boolean
  program.skip_dimensions: array
  program.skip_dimensions.*: string
  program.architecture_ready: boolean
  artifact_plan.status: string
  artifact_plan.approved: boolean
  artifact_plan.write_authorized: boolean
  artifacts.written: boolean
  artifacts.generated_paths: array
  curator_requests.requests: array
  graduation.static_verification: string
  graduation.static_evidence_id: string
  graduation.live_verification: string
  graduation.live_provider_intent: boolean
  graduation.ready_for_live: boolean
  graduation.live_evidence_id: string
  graduation.rebase_status: string
  graduation.rebase_evidence_id: string
  graduation.rebase_verification: string
  graduation.rebase_static_evidence_id: string
  governance.round_counter: number

repair_bound: 2

fallback:
  channel: widget_output
  payload: { ok: false }

guidance:
  intake_intelligence:
    - "If program.target_dir_confirmed is not true: first capture program identity. The CLI may have pre-filled program.slug, program.name, or program.target_dir via initialDomain. If any of slug/name/target_dir is missing, ask the user via request_user_action with intent='collect_program_identity'. If slug is provided but name is missing, derive name as title-case of slug. If target_dir is blank, default to './<slug>'. Echo back the proposed slug/name/target_dir for confirmation, then call record_program_target with slug, name, and target_dir."
    - "After record_program_target, if program.design_path is not set, ask the user whether they want to design the program now (~6 quick questions) or take the default 3-mode start->working->complete skeleton. Use request_user_action with intent='choose_design_path'. Then call choose_design_path with choice='design' or choice='default'."
    - "If program.design_path == 'default' and intake.program_intake_recorded is not true: immediately call apply_default_skeleton. Do NOT ask Q1-Q6."
    - "If program.design_path == 'design' and intake.program_intake_recorded is not true: ask the 6 design questions IN ORDER, one at a time or in a small batch, with brief context for each. Order matters."
    - "Q1 Purpose — one sentence on what the program does. Default if skipped: '<program-name>-driven workflow agent'."
    - "Q2 Entry channel — how does work arrive? (user_text, webhook, scheduled tick, another program delegating). Default if skipped: 'user_text'."
    - "Q3 Stages of work — distinct stages, named in order; these become the mode names. Default if skipped: ['start', 'working', 'complete']."
    - "Q4 Decision points — branches, loops, bail-outs; these become extra transitions, optionally with guards. Default if skipped: no extra transitions."
    - "Q5 Delegation — does any stage delegate to a child session / another program? Default if skipped: 'none'."
    - "Q6 Completion criteria — how do you know the program is done? Default if skipped: terminal mode = last stage, guard = 'work.example_ready'."
    - "If the user replies 'skip' to any Q1-Q6 dimension, record the skip in program.skip_dimensions and use the dimension's default in the JSON-string scalar fields."
    - "Once you have all 6 answers or defaults, call record_program_intake with purpose, entry_channel, stages_json, transitions_json, delegation_json, and completion_json. The *_json arguments must be JSON-string scalar fields, not nested arrays or objects."
    - "After intake is recorded via apply_default_skeleton OR record_program_intake, echo back the proposed mode list + transitions + target_dir to the user and ask for confirmation via request_user_action with intent='confirm_design'. Wait for the user_confirmation trigger."
    - "On user_confirmation with decision='approve', call confirm_design."
    - "On user_confirmation with decision='reject' or decision='edit', do NOT call confirm_design. Ask which dimension to revise, re-run the relevant step, and re-emit the echo-back."
    - "Don't re-ask anything you already extracted from the user's free-text introduction."
  scaffold_plan:
    - "Call plan_artifacts to produce the artifact plan from the synthesized spec in in-process transit. If the handler reports the spec is missing from transit, call synthesize_program_spec again; the synthesizer is mechanical and idempotent."
    - "Echo the artifact-plan list (paths + purposes) to the user. Ask for approval via request_user_action with intent='approve_artifact_plan'."
    - "On user_confirmation decision='approve', call approve_artifact_plan. Then the transition to branch_write fires."
    - "On reject/edit: don't call approve_artifact_plan; ask which artifact the user wants changed; re-emit."
  architecture_design:
    - "On entering architecture_design after confirm_design, call synthesize_program_spec. The handler performs mechanical synthesis with no LLM call, writes the YAML to in-process transit for this session, and flips program.synthesis_complete via the action-map mutation."
    - "After synthesize_program_spec succeeds, transition to scaffold_plan. If the foundry server restarted and downstream planning reports missing transit state, re-run synthesize_program_spec; same intake produces the same YAML."

control_plane:
  version: 1
  session:
    program: "pgas-new"
    binding: identity_channel_program
    concurrency:
      policy: single_active
      on_busy: reject_with_status
  free_text:
    control: ask
    bind:
      query: "$text"
  controls:
    ask:
      title: Ask
      aliases: ["/ask"]
      args:
        query:
          type: string
          required: true
          capture: rest
      dispatch:
        - op: create_session
          as: session
          program: "pgas-new"
          domain_context:
            query: "$args.query"
        - op: trigger
          session: "$session.id"
          channel: user_text
          payload: "$args.query"
          mode: async
    abort:
      title: Abort run
      aliases: ["/abort", "/stop"]
      availability:
        when: "active_session.running"
      dispatch:
        - op: abort_session
          session: "$active_session.id"
      presentation:
        priority: destructive
        confirm: true
    new:
      title: New session
      aliases: ["/new", "/reset", "/restart"]
      dispatch:
        - op: create_session
          as: session
          program: "pgas-new"
      presentation:
        priority: secondary
    history:
      title: Recent sessions
      aliases: ["/history", "/recent"]
      dispatch:
        - op: list_sessions
          as: sessions
      presentation:
        priority: secondary
    status:
      title: Status
      aliases: ["/status"]
      availability:
        when: "active_session"
      dispatch:
        - op: render_session
          session: "$active_session.id"
          view: status
      presentation:
        priority: contextual
    resume:
      title: Resume
      aliases: ["/resume"]
      availability:
        when: "active_session"
      dispatch:
        - op: send_runtime_control
          session: "$active_session.id"
          control: resume
      presentation:
        priority: contextual
    help:
      title: Help
      aliases: ["/help"]
      dispatch:
        - op: render_help
      presentation:
        priority: secondary
