name: "pgas-new"
termination: BoundedSession
topology: CyclicTopology
pure: true

preamble: |
  Program: PGAS New. You create PGAS programs through governed modes,
  explicit artifact planning, repo-curator wiring manifests, and static
  then live verification. Use only the current mode vocabulary and keep
  user decisions in the notebook-backed domain.

initial: intake_intelligence
terminal: [pr_graduation]

features:
  - base
  - reactions
  - runtime_control

channels:
  user_text: { direction: In, sync: Async }
  user_confirmation: { direction: In, sync: Async, structured_decision: true }
  system_mode_entry: { direction: In, sync: Async }
  widget_output: { direction: Out, sync: Async }
  artifact_plan_output: { direction: Out, sync: Sync }
  domain_synthesis_output: { direction: Out, sync: Sync }
  composite_checks_output: { direction: Out, sync: Sync }

modes:
  intake_intelligence:
    vocabulary: [record_program_target, choose_design_path, apply_default_skeleton, ask_design_question, record_q1_purpose, record_q2_entry_channel, record_q3_stages, record_q4_transitions, record_q5_delegation, record_q6_completion, record_program_intake_finalize, confirm_design, reject_design_and_revise_q1, reject_design_and_revise_q2, reject_design_and_revise_q3, reject_design_and_revise_q4, reject_design_and_revise_q5, reject_design_and_revise_q6, record_user_note, pin_notebook_note, confirm_research_scope, record_user_requested_research, web_research, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [user_text, user_confirmation, system_mode_entry, widget_output]
    preconditions:
      record_program_target:
        - { kind: FieldFalsy, path: program.target_dir_confirmed }
      choose_design_path:
        - { kind: FieldTruthy, path: program.target_dir_confirmed }
        - { kind: FieldFalsy, path: program.design_path }
      apply_default_skeleton:
        - { kind: FieldEquals, path: program.design_path, value: default }
        - { kind: FieldFalsy, path: intake.program_intake_finalized }
      record_q1_purpose:
        - { kind: FieldEquals, path: program.design_path, value: design }
        - { kind: FieldFalsy, path: intake.q1_recorded }
      record_q2_entry_channel:
        - { kind: FieldTruthy, path: intake.q1_recorded }
        - { kind: FieldFalsy, path: intake.q2_recorded }
      record_q3_stages:
        - { kind: FieldTruthy, path: intake.q2_recorded }
        - { kind: FieldFalsy, path: intake.q3_recorded }
      record_q4_transitions:
        - { kind: FieldTruthy, path: intake.q3_recorded }
        - { kind: FieldFalsy, path: intake.q4_recorded }
      record_q5_delegation:
        - { kind: FieldTruthy, path: intake.q4_recorded }
        - { kind: FieldFalsy, path: intake.q5_recorded }
      record_q6_completion:
        - { kind: FieldTruthy, path: intake.q5_recorded }
        - { kind: FieldFalsy, path: intake.q6_recorded }
      record_program_intake_finalize:
        - { kind: FieldTruthy, path: intake.q1_recorded }
        - { kind: FieldTruthy, path: intake.q2_recorded }
        - { kind: FieldTruthy, path: intake.q3_recorded }
        - { kind: FieldTruthy, path: intake.q4_recorded }
        - { kind: FieldTruthy, path: intake.q5_recorded }
        - { kind: FieldTruthy, path: intake.q6_recorded }
        - { kind: FieldFalsy, path: intake.program_intake_finalized }
      confirm_design:
        - { kind: FieldTruthy, path: intake.program_intake_finalized }
        - { kind: FieldTruthy, path: program.target_dir_confirmed }
        - { kind: FieldFalsy, path: program.design_confirmed }
        - { kind: TriggerType, triggerSet: [user_confirmation] }
        - { kind: FieldEquals, path: inputs.user_decision.decision, value: approve }
      reject_design_and_revise_q1:
        - { kind: FieldTruthy, path: intake.program_intake_finalized }
        - { kind: TriggerType, triggerSet: [user_confirmation] }
        - { kind: FieldEquals, path: inputs.user_decision.decision, value: reject }
      reject_design_and_revise_q2:
        - { kind: FieldTruthy, path: intake.program_intake_finalized }
        - { kind: TriggerType, triggerSet: [user_confirmation] }
        - { kind: FieldEquals, path: inputs.user_decision.decision, value: reject }
      reject_design_and_revise_q3:
        - { kind: FieldTruthy, path: intake.program_intake_finalized }
        - { kind: TriggerType, triggerSet: [user_confirmation] }
        - { kind: FieldEquals, path: inputs.user_decision.decision, value: reject }
      reject_design_and_revise_q4:
        - { kind: FieldTruthy, path: intake.program_intake_finalized }
        - { kind: TriggerType, triggerSet: [user_confirmation] }
        - { kind: FieldEquals, path: inputs.user_decision.decision, value: reject }
      reject_design_and_revise_q5:
        - { kind: FieldTruthy, path: intake.program_intake_finalized }
        - { kind: TriggerType, triggerSet: [user_confirmation] }
        - { kind: FieldEquals, path: inputs.user_decision.decision, value: reject }
      reject_design_and_revise_q6:
        - { kind: FieldTruthy, path: intake.program_intake_finalized }
        - { kind: TriggerType, triggerSet: [user_confirmation] }
        - { kind: FieldEquals, path: inputs.user_decision.decision, value: reject }
      web_research:
        - { kind: FieldTruthy, path: intake.user_research_authorized }
    transitions:
      - target: repo_targeting
        guard: { kind: FieldTruthy, path: program.design_confirmed }
  repo_targeting:
    vocabulary: [select_repo_target, authorize_standalone_target, load_wiring_manifest, authorize_existing_repo_target, create_curator_request, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [system_mode_entry, widget_output]
    preconditions:
      select_repo_target:
        - { kind: FieldTruthy, path: program.target_dir_confirmed }
      authorize_standalone_target:
        - { kind: FieldTruthy, path: program.target_dir_confirmed }
        - { kind: FieldFalsy, path: repo.write_authorized }
      load_wiring_manifest:
        - { kind: FieldTruthy, path: program.target_dir_confirmed }
        - { kind: FieldFalsy, path: repo.write_authorized }
      authorize_existing_repo_target:
        - { kind: FieldEquals, path: repo.target_kind, value: existing_repo }
        - { kind: FieldEquals, path: repo.wiring_manifest.status, value: valid }
        - { kind: FieldEquals, path: repo.wiring_manifest.path, value: .pgas/wiring.yml }
    transitions:
      - target: architecture_design
        guard: { kind: FieldTruthy, path: repo.write_authorized }
      - target: curator_request
        guard: { kind: FieldTruthy, path: repo.blocked }
  architecture_design:
    vocabulary: [synthesize_program_spec, design_architecture, record_user_note, web_research, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [system_mode_entry, widget_output]
    preconditions:
      synthesize_program_spec:
        - { kind: FieldTruthy, path: program.design_confirmed }
      web_research:
        - { kind: FieldTruthy, path: intake.user_research_authorized }
    transitions:
      - target: scaffold_plan
        guard: { kind: FieldTruthy, path: program.synthesis_complete }
  scaffold_plan:
    vocabulary: [approve_artifact_plan, revise_artifact_plan, plan_artifacts, create_curator_request, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [user_confirmation, system_mode_entry, widget_output, artifact_plan_output]
    preconditions:
      plan_artifacts:
        - { kind: FieldTruthy, path: repo.write_authorized }
        - { kind: FieldTruthy, path: program.synthesis_complete }
        - { kind: FieldFalsy, path: artifact_plan.status }
        - { kind: TriggerType, triggerSet: [system_mode_entry] }
      approve_artifact_plan:
        - { kind: FieldTruthy, path: repo.write_authorized }
        - { kind: FieldTruthy, path: program.synthesis_complete }
        - { kind: FieldEquals, path: artifact_plan.status, value: draft }
        - { kind: FieldFalsy, path: artifact_plan.approved }
        - { kind: TriggerType, triggerSet: [user_confirmation] }
        - { kind: FieldEquals, path: inputs.user_decision.decision, value: approve }
      revise_artifact_plan:
        - { kind: FieldTruthy, path: repo.write_authorized }
        - { kind: FieldTruthy, path: program.synthesis_complete }
        - { kind: FieldEquals, path: artifact_plan.status, value: draft }
        - { kind: FieldFalsy, path: artifact_plan.approved }
        - { kind: TriggerType, triggerSet: [user_confirmation] }
        - { kind: FieldEquals, path: inputs.user_decision.decision, value: reject }
    transitions:
      - target: domain_synthesis
        guard: { kind: FieldEquals, path: artifact_plan.status, value: approved }
  domain_synthesis:
    vocabulary: [synthesize_domain_logic, record_user_note, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [system_mode_entry, widget_output, domain_synthesis_output]
    preconditions:
      synthesize_domain_logic:
        - { kind: FieldEquals, path: artifact_plan.status, value: approved }
        - { kind: FieldTruthy, path: artifact_plan.write_authorized }
        - { kind: FieldFalsy, path: program.domain_synthesis_complete }
        - { kind: TriggerType, triggerSet: [system_mode_entry] }
    transitions:
      - target: branch_write
        guard: { kind: FieldTruthy, path: program.domain_synthesis_complete }
  branch_write:
    vocabulary: [write_scaffold_artifacts, git_status, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [system_mode_entry, widget_output]
    preconditions:
      write_scaffold_artifacts:
        - { kind: FieldEquals, path: artifact_plan.status, value: approved }
        - { kind: FieldTruthy, path: artifact_plan.write_authorized }
        - { kind: FieldTruthy, path: program.domain_synthesis_complete }
    transitions:
      - target: static_verify
        guard: { kind: FieldTruthy, path: artifacts.written }
  static_verify:
    vocabulary: [npm_install, npm_typecheck, npm_test, run_static_verification, run_parallel_static_checks, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [system_mode_entry, widget_output, composite_checks_output]
    transitions:
      - target: smoke_verify
        guard: { kind: FieldEquals, path: graduation.static_verification, value: passed }
  smoke_verify:
    vocabulary: [run_smoke_verification, confirm_live_provider_intent, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [system_mode_entry, widget_output]
    preconditions:
      run_smoke_verification:
        - { kind: FieldEquals, path: graduation.static_verification, value: passed }
      confirm_live_provider_intent:
        - { kind: FieldEquals, path: graduation.smoke_verification, value: passed }
    transitions:
      - target: live_verify
        guard: { kind: FieldTruthy, path: graduation.ready_for_live }
  live_verify:
    vocabulary: [run_api_blackbox_verification, run_live_provider_verification, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [system_mode_entry, widget_output]
    preconditions:
      run_api_blackbox_verification:
        - { kind: FieldTruthy, path: graduation.live_provider_intent }
      run_live_provider_verification:
        - { kind: FieldTruthy, path: graduation.live_provider_intent }
    transitions:
      - target: rebase_verify
        guard: { kind: FieldEquals, path: graduation.live_verification, value: passed }
  rebase_verify:
    vocabulary: [git_status, git_rebase_latest, run_rebase_static_verification, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [system_mode_entry, widget_output]
    preconditions:
      run_rebase_static_verification:
        - { kind: FieldEquals, path: graduation.rebase_status, value: passed }
    transitions:
      - target: pr_graduation
        guard: { kind: FieldEquals, path: graduation.rebase_verification, value: passed }
  pr_graduation:
    vocabulary: [open_pull_request, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [system_mode_entry, widget_output]
  curator_request:
    vocabulary: [create_curator_request, record_user_note, session_new, session_abort_current, session_status, session_history, session_resume, session_help]
    channels: [system_mode_entry, widget_output]
    transitions:
      - target: repo_targeting
        guard: { kind: FieldTruthy, path: repo.curator_request_lodged }

proceed_to:
  authorize_standalone_target: architecture_design
  authorize_existing_repo_target: architecture_design
  design_architecture: scaffold_plan
  synthesize_program_spec: scaffold_plan
  confirm_design: repo_targeting
  approve_artifact_plan: domain_synthesis
  synthesize_domain_logic: branch_write
  write_scaffold_artifacts: static_verify
  run_static_verification: smoke_verify
  confirm_live_provider_intent: live_verify
  run_live_provider_verification: rebase_verify
  run_rebase_static_verification: pr_graduation

projection:
  intake_intelligence:
    include:
      - inputs.user_text
      - inputs.user_decision
      - inputs.user_decision.decision
      - inputs.user_decision.instruction
      - inputs.user_decision.note_mode
      - inputs.user_decision.timestamp
      - intake.mandate
      - intake.research_allowed
      - intake.research_confirmed
      - intake.user_requested_research
      - intake.purpose
      - intake.q1_recorded
      - intake.entry_channel
      - intake.q2_recorded
      - intake.stages_json
      - intake.q3_recorded
      - intake.transitions_json
      - intake.q4_recorded
      - intake.delegation_json
      - intake.q5_recorded
      - intake.completion_json
      - intake.q6_recorded
      - intake.program_intake_finalized
      - program.slug
      - program.name
      - program.target_dir
      - program.target_dir_confirmed
      - program.design_path
      - program.design_confirmed
      - program.skip_dimensions
      - notebook.entries
      - notebook.pins
    exclude: []
  repo_targeting:
    include: [program.slug, program.name, program.target_dir, program.target_dir_confirmed, repo.target_kind, repo.wiring_manifest.status, repo.wiring_manifest.path, repo.wiring_manifest_json, repo.allowed_imports, repo.write_authorized, repo.required_facilities_missing]
    exclude: []
  architecture_design:
    include: [program.slug, program.name, program.target_dir, program.runtime, program.design_confirmed, program.synthesis_complete]
    exclude: []
  scaffold_plan:
    include: [program.slug, program.name, program.target_dir, program.synthesis_complete, inputs.user_decision, inputs.user_decision.decision, inputs.user_decision.instruction, inputs.user_decision.note_mode, inputs.user_decision.timestamp, artifact_plan.status, artifact_plan.artifacts, artifact_plan.approved, artifact_plan.write_authorized, notebook.entries, notebook.pins]
    exclude: []
  domain_synthesis:
    include: [program.slug, program.name, program.target_dir, repo.target_kind, program.synthesis_complete, program.domain_synthesis_complete, artifact_plan.status, artifact_plan.artifacts, artifact_plan.write_authorized, domain_synthesis.audit]
    exclude: []
  branch_write:
    include: [program.slug, program.name, program.target_dir, repo.target_kind, program.synthesis_complete, program.domain_synthesis_complete, artifact_plan.status, artifact_plan.artifacts, artifact_plan.write_authorized, domain_synthesis.audit, artifacts.written, artifacts.generated_paths]
    exclude: []
  static_verify:
    include: [program.target_dir, graduation.static_verification, graduation.static_evidence_id, graduation.composite_checks]
    exclude: []
  smoke_verify:
    include: [program.target_dir, graduation.static_verification, graduation.smoke_verification, graduation.smoke_evidence_id, graduation.live_provider_intent, graduation.ready_for_live]
    exclude: []
  live_verify:
    include: [program.target_dir, graduation.live_verification, graduation.live_provider_intent, graduation.live_evidence_id]
