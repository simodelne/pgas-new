name: Agent handoff brief
description: A reproducible brief for a sub-agent dispatched under the orchestrator pattern.
title: "[handoff] <one-line scope>"
labels: ["agent-handoff"]
body:
  - type: markdown
    attributes:
      value: |
        Per CLAUDE.md "Agent behavior — orchestrator role":
        sub-agents are dispatched with reproducible briefs. This template
        is the canonical brief shape. The orchestrator drafts it, the
        sub-agent pastes it verbatim into their PR's "## Brief" section.
  - type: input
    id: title
    attributes:
      label: Scope (one line)
    validations:
      required: true
  - type: textarea
    id: brief
    attributes:
      label: Brief
      description: |
        The full text the sub-agent will receive. Include role,
        authoritative input file paths, the exact list of files to
        touch (when known), and any cross-repo dependencies.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria ("done when")
      description: Concrete checklist the sub-agent ticks off.
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals (what NOT to do)
    validations:
      required: false
  - type: textarea
    id: classifier_denial_rule
    attributes:
      label: Classifier-denial rule (verbatim — include in every brief)
      value: |
        When `Claude Code auto-mode classifier` denies a tool call, **stop**.
        Do not retry the same call with `dangerouslyDisableSandbox: true`
        or any equivalent bypass. Surface to the orchestrator: what was
        attempted, why it seems needed, and what a smaller alternative
        looks like.

        This holds even when the denial seems mistaken — the work is
        correct, the scope feels appropriate, the call is "obviously safe".
        The classifier is the user's oversight layer; bypassing it removes
        the human-in-the-loop the user explicitly opted into. Escalation,
        not bypass, is the only correct response.
    validations:
      required: true
