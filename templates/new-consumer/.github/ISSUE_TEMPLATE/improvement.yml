name: Improvement
description: A non-bug enhancement to the consumer's program, server, or tooling.
title: "[improvement] <one-line summary>"
labels: ["improvement"]
body:
  - type: input
    id: title
    attributes:
      label: One-line summary
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation (why)
      description: What problem does this solve? Cite evidence (user feedback, eval results, observed friction).
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope (what)
      description: What changes? Files, components, behaviors.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete "done when" checklist.
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What this explicitly does NOT do.
    validations:
      required: false
