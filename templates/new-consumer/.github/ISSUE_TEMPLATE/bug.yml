name: Bug report
description: A defect in this consumer's program, server, handlers, or governance tooling.
title: "[bug] <one-line summary>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for any observed defect. Per the user-global
        data-driven-debugging rule, ground every claim in a specific
        observation (log line, metric, NDJSON event, domain field).
        Mark inferences explicitly. Say "I don't know" when data is absent.
  - type: input
    id: title
    attributes:
      label: One-line summary
      description: A precise one-liner — what was expected vs what happened.
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: Reproducer
      description: Steps to reproduce, including commit SHA and the exact command(s) run.
      placeholder: |
        1. git checkout <SHA>
        2. npm install
        3. npm run dev
        4. ...
        Observed: <output>
        Expected: <output>
    validations:
      required: true
  - type: textarea
    id: suspected_cause
    attributes:
      label: Suspected root cause
      description: |
        Mark inferences explicitly: `observed` → `inferred (given Y)` →
        `hypothesized`. If you don't know, say so — list what new data
        would confirm.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is fixed?
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - blocker (cannot proceed)
        - major (workaround exists)
        - minor (nuisance)
        - investigation (needs more data)
      default: 3
    validations:
      required: true
