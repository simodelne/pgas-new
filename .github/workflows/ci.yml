name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: [self-hosted, gpu-pod]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run pgas-new foundry gates
        run: env -u PGAS_OPENAI_BASE_URL -u PGAS_OPENAI_MODEL -u PGAS_LIVE_SYNTH -u PGAS_LIVE_GRADUATION -u PGAS_LIVE_REPO_TARGETING npm test
